artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Line-oriented parsing of a small, well-formed access log with a handful of entries and no tricky edge cases; solvable in well under an hour by any engineer comfortable with basic text processing."
solution_explanation = "Read /app/access.log line by line. Count non-empty lines as total_requests, collect the first whitespace-separated field of each line into a set for unique_ips, and extract the path from the quoted request line to find the most frequently requested top_path. Serialize the three values as a JSON object to /app/report.json."
verification_explanation = "The verifier loads /app/report.json, asserts it is a JSON object, and checks each field against the known-correct values derived from the fixed access.log (total_requests=6, unique_ips=3, top_path=/index.html). A no-op agent that writes no output fails (reward 0); the oracle solution passes (reward 1)."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
